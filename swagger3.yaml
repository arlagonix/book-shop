components:

  securitySchemes:
    
    ApiKeyAuth:
      type: apiKey
      in: header
      name: token
  
  requestBodies:
    
    LoginBody:
      description: >    
          * Ограничения на `Логин`:
            * У пользователей должны быть разные логины
            * 3 символа ≤ Длина логина ≤ 128 символов
            * Может содержать лат. буквы в ниж регистре: `a-z`
            * Может содержать лат. буквы в верхнем регистре: `A-Z`
            * Может содержать цифры: `0-9`
            * Может содержать спец. символы: `_ - . `
            * Прочие символы запрещены
              
          * Ограничения на `Пароль`:
            * 8 символов ≤ Длина пароля ≤ 128 символов
            * ≥ 1 спец. символа: `( . , : ; ? ! * + % - < > @ [ ] { } / \ _ {} $ # )`
            * ≥ 1 букву в верхнем регистре лат. алфавита: `a - z`
            * ≥ 1 букву в нижнем регистре лат. алфавита: `A - Z`
            * ≥ 1 цифру: `0 - 9`
            * Прочие символы запрещены
            
          Источник требований: [Требования к парольной защите](https://wiki.sbermed.ai/pages/viewpage.action?pageId=30641696)
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/LoginBody"

    ChangePassword:
      required: true
      content:
        application/json:
          schema:
            title: Данные для смены пароля
            type: object
            required:
              - pwd
            properties:
              pwd:
                type: string
                example: "12345A_heh"
                description: Новый пароль

  responses: 

    200-session-created:
      description: Сессия создана, токен и информация о пользователе получены
      content:
        application-json:
          schema:
            title: Токен и информация о пользователе
            allOf:
            - type: object
              required:
              - res
              properties:
                res:
                  description: Возвращаемый результат
                  type: object
                  required:
                    - token
                  properties:
                    sid:
                      description: Токен
                      type: string
                      example: da77d54cb3c16cf624b2b871ed6c5889a7ae9ee205cfc760af144a825508
                    user_id:
                      description: ID пользователя
                      type: integer
                      example: 1337
                    user_login:
                      description: Логин пользователя
                      type: string
                      example: test_user
                    user_type:
                      $ref: "#/components/schemas/UserTypes"
                    need_change_pwd:
                      description: >
                        Необходиомость смены пароля
                          * 0 - Не нужно менять
                          * 1 - Нужно менять
                      type: integer
                      enum:
                        - 0
                        - 1
            - $ref: '#/components/schemas/ErrorAndComments'

    401-wrong-token:
      description: Токен отсутствует, просрочен или не зарегистрирован
      content:
        application-json:
          schema:
            $ref: '#/components/schemas/StandardResponse'
          example:
            res : null
            error_code : wrong-token
            comments : Токен отсутствует, просрочен или не зарегистрирован
  
  examples:

    400-wrong-request:
      summary: Неверный запрос
      value:
        res: null
        error: wrong-request
        comments: wrong-parameter

    400-no-login:
      summary: Логин не передан
      value:
        res: null
        error: 45
        comments: Логин не передан  

    400-no-password:
      summary: Пароль не передан
      value:
        res: null
        error_code: 45
        comments: Пароль не передан

    401-wrong-login:
      summary: Неверный логин
      value:
        res: null
        error: 43
        comments: Пользователь с логином test_user отсутствует в системе

    401-wrong-password:
      summary: Неверный пароль
      value:
        res: null
        error: 43
        comments: Неверный пароль для пользователя с логином test_user

  schemas:
    
    
    
    LoginBody:
      title: Данные для авторизации
      type: object
      required:
        - login
        - pwd
        - date_start
      properties:
        login:
          type: string
          example: doctor_1
          description: Логин пользователя
        pwd:
          type: string
          example: "123sfs123dsaA_A"
          description: Пароль пользоватля
        date_start:
          description: > 
            Дата начала сессии
              
            *Бесмысленное поле, но его нужно заполнить*
          type: string
          format: dateTime
          example: "2021-06-23T12:00:01+05:00"
    
    User:
      title: Информация о пользователе
      type: object
      required:
        - id
        - login
        - email
        - user_type
        - date_create
        - company_id
        - need_change_pwd
        - state
      properties:
        id:
          description: ID пользователя
          type: integer
          example: 47
        login:
          description: Логин пользователя
          type: string
          example: test_user
        email:
          description: Email пользователя
          type: string
          nullable: true
          example: test_user@domain.com
        user_type:
          $ref: '#/components/schemas/UserTypes'
        date_create:
          description: Дата создания пользователя
          type: string
          format: date-time
          example: 2021-06-23T12:00:01+05:00
        company_id:
          description: ID организации, которой принадлежит пользователь
          type: integer
          example: 12
        need_change_pwd:
          description: >
            Необходиомость смены пароля
              * 0 - Не нужно менять
              * 1 - Нужно менять
          type: integer
          enum:
            - 0
            - 1
          example: 0
        state:
          description: Статус пользователя
          type: integer
          example: 0

    Balance:
      title: Баланс???
      type: object
      required:
        - id
        - company_id
        - doctor_id
        - balance
        - date_create
        - balance_date
      properties:
        id:
          description: ID чего-то
          type: integer
          example: 22
        company_id:
          description: ID организации, которой принадлежит пользователь
          type: integer
          nullable: true
          example: null
        doctor_id:
          description: ID врача
          type: integer
          nullable: true
          example: 31
        balance:
          description: Баланс ???
          type: integer
          example: 1000
        balance_date:
          description: Дата баланса ???
          type: string
          format: date-time
          nullable: true
          example: null

    ConsultCenterBrief:
      title: Краткая информация о консультационном центре
      type: object
      required:
        - id
      properties:
        id:
          description: ID компании
          type: integer
          example: 12
        company_name:
          description: Наименование компании
          type: string
          example: Test Consult Center
        company_type:
          $ref: '#/components/schemas/CompanyTypes'

    UserTypes:
      title: Типы пользователей
      description: >
        Значения:
          * `doctor` - Доктор
          * `consultant` - Консультант
          * `admin` - Администратор
          * `gate` - Шлюз
      type: string
      enum:
        - doctor
        - consultant
        - admin
        - gate

    CompanyTypes:
      title: Типы компаний
      description: >
        Значения:
          * `hospital` - Лечебно-профилактическое учреждение (ЛПУ)
          * `consult_center` - консультационный центр (КЦ)
      type: string
      enum:
        - hospital
        - consult_center
      example: consult_center
    
    DefaultResponse:
      type: object
      required:
        - res
        - error
        - comments
      properties:
        res:
          type: string
          description: "usualy empty string"
        error:
          type: string
          description: "0 if ok, 1 if fail"
        comments:
          type: string
          description: "empty string if ok else - error description"

    ErrorAndComments:
      title: Код и описание ошибки
      type: object
      required:
      - error
      - comments
      properties:
        error:
          description: Код ошибки
          type: string
          nullable: true
          example: 
        comments:
          description: Описание ошибки
          type: string
          nullable: true
          example: 

    StandardResponse:
      title: Стандартный ответ
      allOf:
      - type: object
        required:
        - res
        properties:
          res:
            description: Возвращаемый результат
            type: object
            nullable: true
            example: 
      - $ref: '#/components/schemas/ErrorAndComments'

